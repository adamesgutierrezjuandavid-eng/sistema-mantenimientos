<div class="search-box">
  <label for="codigo">Codigo de barras o serial</label>
  <div class="search-row">
    <input
      id="codigo"
      #codigoInput
      type="text"
      name="codigoBusqueda"
      [ngModel]="codigo"
      placeholder="Escanee o escriba el codigo"
      autofocus
      (ngModelChange)="actualizarCodigo($event)"
      (keyup.enter)="enterBusqueda.emit(codigoInput.value); $event.preventDefault()"
      (keydown.ArrowDown)="moverSugerencia.emit(1); $event.preventDefault()"
      (keydown.ArrowUp)="moverSugerencia.emit(-1); $event.preventDefault()"
    />
    <button type="button" (click)="buscar.emit(codigoInput.value)">Buscar</button>
  </div>

  <div class="search-history" *ngIf="historialBusqueda.length > 0 || sugerenciasBusqueda.length > 0">
    <div class="search-history-header">
      <span *ngIf="sugerenciasBusqueda.length > 0">Sugerencias</span>
      <span *ngIf="sugerenciasBusqueda.length === 0">Ultimas busquedas</span>
      <button type="button" class="secondary" (click)="limpiarHistorial.emit()">
        Limpiar historial
      </button>
    </div>
    <div class="search-history-list">
      <button
        type="button"
        class="history-chip"
        *ngFor="let item of (sugerenciasBusqueda.length > 0 ? sugerenciasBusqueda : historialBusqueda); let i = index"
        [class.active]="sugerenciasBusqueda.length > 0 && i === sugerenciaActiva"
        (click)="usarHistorial.emit(item)"
      >
        {{ item }}
      </button>
    </div>
  </div>

  <div class="search-results" *ngIf="resultadosBusqueda.length > 0">
    <div class="search-results-header">Resultados de busqueda</div>
    <div class="search-results-list">
      <button
        type="button"
        class="result-item"
        *ngFor="let equipo of resultadosBusqueda"
        (click)="seleccionarResultado.emit(equipo)"
      >
        <strong>{{ equipo.codigo_barras }}</strong> · {{ equipo.nombre }}
        <div class="result-meta">{{ equipo.marca }} · {{ equipo.empresa }} · {{ equipo.area }}</div>
      </button>
    </div>
  </div>
</div>

<p class="message" *ngIf="mensaje">{{ mensaje }}</p>
<p class="message" *ngIf="cargando">Buscando equipo...</p>

<div class="actions search-actions" *ngIf="ultimoCodigoNoEncontrado">
  <button type="button" (click)="prepararRegistro.emit()">
    Registrar este equipo
  </button>
</div>

<div class="actions search-actions" *ngIf="!ultimoCodigoNoEncontrado">
  <button type="button" class="secondary" (click)="alternarRegistro.emit()">
    {{ mostrarFormularioEquipo ? 'Cancelar registro de equipo' : 'Registrar nuevo equipo' }}
  </button>
</div>
