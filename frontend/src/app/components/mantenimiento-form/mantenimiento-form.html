<section class="panel">
  <h2>Registrar mantenimiento</h2>

  <form class="maintenance-form" (ngSubmit)="guardar.emit()">
    <div>
      <label>Fecha mantenimiento *</label>
      <input
        type="date"
        name="fecha_mantenimiento"
        [(ngModel)]="mantenimiento.fecha_mantenimiento"
      />
    </div>

    <div>
      <label>Tipo *</label>
      <select
        name="tipo_mantenimiento"
        [(ngModel)]="mantenimiento.tipo_mantenimiento"
      >
        <option value="preventivo">Preventivo</option>
        <option value="correctivo">Correctivo</option>
        <option value="predictivo">Predictivo</option>
      </select>
    </div>

    <div>
      <label>Tecnico *</label>
      <input
        type="text"
        name="tecnico"
        [(ngModel)]="mantenimiento.tecnico"
      />
    </div>

    <div>
      <label>Estado</label>
      <select
        name="estado"
        [(ngModel)]="mantenimiento.estado"
      >
        <option value="terminado">Terminado</option>
        <option value="pendiente">Pendiente</option>
        <option value="en proceso">En proceso</option>
      </select>
    </div>

    <div class="full">
      <label>Descripcion *</label>
      <textarea
        name="descripcion"
        rows="3"
        [(ngModel)]="mantenimiento.descripcion"
      ></textarea>
    </div>

    <div class="full">
      <label>Observaciones</label>
      <textarea
        name="observaciones"
        rows="2"
        [(ngModel)]="mantenimiento.observaciones"
      ></textarea>
    </div>

    <div>
      <label>Proxima fecha</label>
      <input
        type="date"
        name="proxima_fecha"
        [(ngModel)]="mantenimiento.proxima_fecha"
      />
    </div>

    <div>
      <label>Fotos de evidencia</label>
      <input
        type="file"
        name="fotos_evidencia"
        accept="image/*"
        multiple
        (change)="seleccionarFotos.emit($event)"
      />
      <p class="hint" *ngIf="archivosSeleccionados.length > 0">
        {{ archivosSeleccionados.length }} foto(s) seleccionada(s)
      </p>
    </div>

    <div class="actions">
      <button type="submit">Guardar mantenimiento</button>
    </div>
  </form>
</section>
